  <line x1="647" y1="242" x2="647" y2="266" stroke="#FF9900" stroke-width="1"></line>
  <!-- leaf mark on box -->
  <path d="M 647 244 Q 652 250 647 256 Q 642 250 647 244Z" fill="#FF9900" opacity=".8"></path>
</g>

</svg>