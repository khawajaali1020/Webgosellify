<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes dash { to{stroke-dashoffset:-24} }
    @keyframes bob1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes bob2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes bob3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes bob4 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes scanH{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(22px)} }
    @keyframes unbox{ 0%,60%{transform:rotate(0deg)} 80%{transform:rotate(-18deg)} 100%{transform:rotate(0deg)} }
    @keyframes rpk  { 0%,60%{opacity:0;transform:scale(.7)} 80%{opacity:1;transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
    @keyframes custB{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    .fl  { stroke-dasharray:10 6; animation:dash 1.4s linear infinite; }
    .fr  { stroke-dasharray:10 6; animation:dash 1.4s linear infinite .2s; }
    .b1  { animation:bob1 3.2s ease-in-out infinite; }
    .b2  { animation:bob2 2.9s ease-in-out infinite .5s; }
    .b3  { animation:bob3 3.5s ease-in-out infinite .9s; }
    .b4  { animation:bob4 2.7s ease-in-out infinite 1.3s; }
    .scan{ animation:scanH 2.2s ease-in-out infinite; }
    .ubx { animation:unbox 3s ease-in-out infinite 1s; transform-origin:300px 232px; }
    .rpk { animation:rpk   3s ease-in-out infinite 1s; transform-origin:362px 236px; }
    .cb  { animation:custB 3s ease-in-out infinite .6s; }
  </style>
  <clipPath id="wclip"><rect x="238" y="118" width="204" height="224" rx="20"></rect></clipPath>
<mask id="imagine-text-gaps-tkuurr" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="460" fill="white"></rect><rect x="20" y="62.833213806152344" width="59.775177001953125" height="22.41682243347168" fill="black" rx="2"></rect><rect x="54" y="167.1387939453125" width="54.89796447753906" height="17.22233486175537" fill="black" rx="2"></rect><rect x="52" y="259.0276794433594" width="37.05666732788086" height="14.86120319366455" fill="black" rx="2"></rect><rect x="52" y="272.0276794433594" width="30.216764450073242" height="14.86120319366455" fill="black" rx="2"></rect><rect x="58" y="367.1387939453125" width="43.785892486572266" height="17.386448860168457" fill="black" rx="2"></rect><rect x="294.0567321777344" y="132.6804962158203" width="91.88656616210938" height="18.639013290405273" fill="black" rx="2"></rect></mask></defs>

<!-- ═══ SINGLE MERGED CONNECTOR PATH: all 4 suppliers → one trunk → warehouse ═══ -->
<!-- vertical spine on left at x=148, collecting all 4 suppliers then running right to warehouse -->
<!-- horizontal branches from each supplier card to spine x=148 -->
<line class="fl" x1="112" y1="76" x2="148" y2="76" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>
<line class="fl" x1="112" y1="176" x2="148" y2="176" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>
<line class="fl" x1="112" y1="276" x2="148" y2="276" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>
<line class="fl" x1="112" y1="376" x2="148" y2="376" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>
<!-- single vertical spine -->
<line class="fl" x1="148" y1="76" x2="148" y2="376" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>
<!-- single horizontal trunk spine → warehouse -->
<line class="fl" x1="148" y1="228" x2="238" y2="228" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>

<!-- warehouse → customer single line -->
<line class="fr" x1="442" y1="228" x2="530" y2="228" fill="none" stroke="#FF6D2B" stroke-width="1.8"></line>

<!-- junction dots on spine -->
<circle cx="148" cy="76" r="3" fill="#FF6D2B"></circle>
<circle cx="148" cy="176" r="3" fill="#FF6D2B"></circle>
<circle cx="148" cy="276" r="3" fill="#FF6D2B"></circle>
<circle cx="148" cy="376" r="3" fill="#FF6D2B"></circle>
<circle cx="148" cy="228" r="4" fill="#FF6D2B"></circle>

<!-- warehouse edge dots -->
<circle cx="238" cy="228" r="4" fill="#FF6D2B"></circle>
<circle cx="238" cy="228" r="8" fill="#FF6D2B" opacity=".15"></circle>
<circle cx="442" cy="228" r="4" fill="#FF6D2B"></circle>
<circle cx="442" cy="228" r="8" fill="#FF6D2B" opacity=".15"></circle>
<circle cx="530" cy="228" r="4" fill="#FF6D2B"></circle>
<circle cx="530" cy="228" r="8" fill="#FF6D2B" opacity=".15"></circle>

<!-- ═══ AMAZON CARD ═══ -->
<g class="b1" style="transform-origin:64px 76px">
  <rect x="16" y="44" width="96" height="64" rx="14" fill="#fff" stroke="#FFD080" stroke-width="1"></rect>
  <!-- Amazon wordmark: dark text + orange smile -->
  <!-- "amazon" text in Ember/dark -->
  <text font-family="Arial Black,Arial,sans-serif" font-size="13" font-weight="900" fill="#232F3E" x="24" y="79" letter-spacing="-0.5">amazon</text>
  <!-- orange smile arc -->
  <path d="M 26 85 Q 64 97 102 85" fill="none" stroke="#FF9900" stroke-width="2.2" stroke-linecap="round" mask="url(#imagine-text-gaps-tkuurr)"></path>
  <!-- arrow tip of smile -->
  <path d="M 99 82 L 104 85 L 98 89" fill="none" stroke="#FF9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
</g>
<circle cx="112" cy="76" r="3.5" fill="#FF6D2B"></circle>

<!-- ═══ WALMART CARD ═══ -->
<g class="b2" style="transform-origin:64px 176px">
  <rect x="16" y="144" width="96" height="64" rx="14" fill="#fff" stroke="#B3D9F5" stroke-width="1"></rect>
  <!-- Walmart spark: 6 diamond petals -->
  <g transform="translate(36,176)">
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(0)   translate(0,-2)"></ellipse>
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(60)  translate(0,-2)"></ellipse>
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(120) translate(0,-2)"></ellipse>
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(180) translate(0,-2)"></ellipse>
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(240) translate(0,-2)"></ellipse>
    <ellipse rx="4.5" ry="10" fill="#0071CE" transform="rotate(300) translate(0,-2)"></ellipse>
  </g>
  <!-- Walmart wordmark -->
  <text font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#0071CE" x="58" y="180">Walmart</text>
</g>
<circle cx="112" cy="176" r="3.5" fill="#FF6D2B"></circle>

<!-- ═══ SAM'S CLUB CARD ═══ -->
<g class="b3" style="transform-origin:64px 276px">
  <rect x="16" y="244" width="96" height="64" rx="14" fill="#fff" stroke="#F5BBBB" stroke-width="1"></rect>
  <!-- Sam's Club pinwheel -->
  <g transform="translate(38,276)">
    <rect x="-4" y="-13" width="8" height="12" rx="4" fill="#CC0000" transform="rotate(0)"></rect>
    <rect x="-4" y="-13" width="8" height="12" rx="4" fill="#CC0000" transform="rotate(90)"></rect>
    <rect x="-4" y="-13" width="8" height="12" rx="4" fill="#CC0000" transform="rotate(180)"></rect>
    <rect x="-4" y="-13" width="8" height="12" rx="4" fill="#CC0000" transform="rotate(270)"></rect>
    <circle r="4.5" fill="#CC0000"></circle>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#CC0000" x="56" y="270">Sam's</text>
  <text font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#CC0000" x="56" y="283">Club</text>
</g>
<circle cx="112" cy="276" r="3.5" fill="#FF6D2B"></circle>

<!-- ═══ TARGET CARD ═══ -->
<g class="b4" style="transform-origin:64px 376px">
  <rect x="16" y="344" width="96" height="64" rx="14" fill="#fff" stroke="#F5BBBB" stroke-width="1"></rect>
  <!-- Target bullseye -->
  <circle cx="40" cy="376" r="17" fill="#CC0000"></circle>
  <circle cx="40" cy="376" r="11" fill="#fff"></circle>
  <circle cx="40" cy="376" r="5.5" fill="#CC0000"></circle>
  <text font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#CC0000" x="62" y="380">Target</text>
</g>
<circle cx="112" cy="376" r="3.5" fill="#FF6D2B"></circle>

<!-- ═══ WAREHOUSE CENTER ═══ -->
<ellipse cx="340" cy="232" rx="112" ry="122" fill="#FF6D2B" opacity=".06"></ellipse>
<rect x="238" y="118" width="204" height="224" rx="20" fill="#FFF8F4" stroke="#FFB085" stroke-width="1.2"></rect>

<!-- top bar with EcomGarden branding -->
<rect x="238" y="118" width="204" height="38" rx="20" fill="#FF6D2B"></rect>
<rect x="238" y="138" width="204" height="18" fill="#FF6D2B"></rect>
<line x1="238" y1="156" x2="442" y2="156" stroke="#e05a1e" stroke-width="0.6"></line>
<!-- EcomGarden name -->
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" x="340" y="142" text-anchor="middle" dominant-baseline="central" letter-spacing="0.3">EcomGarden</text>

<!-- shelf lines -->
<rect x="256" y="288" width="168" height="5" rx="2" fill="#FFD0B5" opacity=".7"></rect>
<rect x="256" y="312" width="168" height="5" rx="2" fill="#FFD0B5" opacity=".5"></rect>

<!-- INBOUND BOX (retailer branded) -->
<g class="ubx">
  <rect x="272" y="218" width="44" height="44" rx="4" fill="#D4956A"></rect>
  <rect x="272" y="211" width="44" height="13" rx="3" fill="#C07840"></rect>
  <rect x="272" y="231" width="44" height="7" fill="#FF9900" opacity=".65"></rect>
  <line x1="294" y1="218" x2="294" y2="262" stroke="#A06030" stroke-width="1"></line>
  <rect x="278" y="240" width="26" height="12" rx="2" fill="#fff" opacity=".5"></rect>
</g>

<!-- centre arrow -->
<path d="M 322 240 L 342 240" fill="none" stroke="#FF6D2B" stroke-width="1.6"></path>
<polygon points="342,236 350,240 342,244" fill="#FF6D2B"></polygon>

<!-- OUTBOUND BOX (EcomGarden branded) -->
<g class="rpk">
  <rect x="352" y="218" width="44" height="44" rx="4" fill="#fff" stroke="#FF6D2B" stroke-width="1.2"></rect>
  <rect x="352" y="210" width="44" height="13" rx="3" fill="#FFE0C8" stroke="#FF6D2B" stroke-width="1"></rect>
  <rect x="352" y="231" width="44" height="7" fill="#FF6D2B" opacity=".75"></rect>
  <line x1="374" y1="218" x2="374" y2="262" stroke="#FF9900" stroke-width="1"></line>
  <!-- leaf/garden icon mark -->
  <path d="M 374 220 Q 382 228 374 238 Q 366 228 374 220Z" fill="#FF9900" opacity=".85"></path>
  <line x1="374" y1="238" x2="374" y2="244" stroke="#FF9900" stroke-width="1.2" stroke-linecap="round"></line>
</g>

<!-- scanner beam -->
<g style="clip-path:url(#wclip)">
  <rect class="scan" x="256" y="162" width="128" height="2" rx="1" fill="#FF6D2B" opacity=".45"></rect>
</g>

<!-- robot arm -->
<line x1="340" y1="196" x2="340" y2="214" stroke="#c8b0a0" stroke-width="2.5" stroke-linecap="round"></line>
<line x1="340" y1="214" x2="326" y2="224" stroke="#c8b0a0" stroke-width="2" stroke-linecap="round"></line>
<circle cx="340" cy="196" r="4" fill="#e8d0c0" stroke="#b08060" stroke-width="0.8"></circle>
<circle cx="326" cy="224" r="2.5" fill="#FF6D2B"></circle>

<!-- ═══ CUSTOMER (single) ═══ -->
<g class="cb" style="transform-origin:598px 228px">
  <rect x="530" y="158" width="136" height="144" rx="18" fill="#fff" stroke="#FFB085" stroke-width="1.2"></rect>

  <!-- armchair -->
  <rect x="546" y="220" width="92" height="56" rx="10" fill="#7F77DD" opacity=".2"></rect>
  <rect x="542" y="230" width="10" height="38" rx="5" fill="#7F77DD" opacity=".25"></rect>
  <rect x="648" y="230" width="10" height="38" rx="5" fill="#7F77DD" opacity=".25"></rect>
  <line x1="549" y1="276" x2="547" y2="292" stroke="#9e94d0" stroke-width="1.5" stroke-linecap="round"></line>
  <line x1="651" y1="276" x2="653" y2="292" stroke="#9e94d0" stroke-width="1.5" stroke-linecap="round"></line>

